<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Cheapflix Nepal</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../config.js"></script>
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>Cheapflix Nepal</h1>
      </div>

      <div class="navbar-menu">
        <a href="../index.html" class="nav-link">Home</a>
        <span class="nav-link" id="userName"></span>
        <button class="btn btn-sm btn-secondary" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="dashboard-container">
    <div class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="#bookings" class="menu-link active">My Bookings</a></li>
        <li><a href="#profile" class="menu-link">Profile</a></li>
        <li><a href="#reviews" class="menu-link">My Reviews</a></li>
        <li><a href="../pages/support.html" class="menu-link" style="background: linear-gradient(135deg, #7C3AED, #D946EF); color: white; border-radius: 6px; margin-top: 10px;">🎟️ Support Tickets</a></li>
        <li><a href="#settings" class="menu-link">Settings</a></li>
      </ul>
    </div>

    <div class="dashboard-content">

      <section id="bookings" class="dashboard-section active">
        <h2>My Bookings</h2>
        <div class="bookings-list" id="bookingsList">
          <p>Loading bookings...</p>
        </div>
      </section>

      <section id="profile" class="dashboard-section">
        <h2>Profile</h2>
        <div id="profileMsg" style="display:none; padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-weight: 500;"></div>
        <form id="profileForm">
          <div class="form-group">
            <label>Name:</label>
            <input type="text" id="profileName" disabled>
          </div>

          <div class="form-group">
            <label>Email:</label>
            <input type="email" id="profileEmail" disabled>
          </div>

          <div class="form-group">
            <label>Phone:</label>
            <input type="tel" id="profilePhone" placeholder="e.g. 9800000000">
          </div>

          <div class="form-group">
            <label>Address:</label>
            <input type="text" id="profileAddress" placeholder="e.g. Kathmandu, Nepal">
          </div>

          <div class="form-group">
            <label>City:</label>
            <input type="text" id="profileCity" placeholder="e.g. Kathmandu">
          </div>

          <button type="submit" class="btn btn-primary" id="saveProfileBtn">Save Changes</button>
        </form>
      </section>

      <section id="reviews" class="dashboard-section">
        <h2>My Reviews</h2>
        <div id="myReviewsList">
          <p style="color:#999;">Loading reviews...</p>
        </div>
      </section>

      <section id="settings" class="dashboard-section">
        <h2>Settings</h2>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </section>

    </div>
  </main>

  <!-- ── Review Modal ── -->
  <div id="reviewModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:16px; padding:32px; max-width:480px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.25);">
      <h2 style="margin:0 0 8px; font-size:1.4rem; color:#1f2937;">⭐ Leave a Review</h2>
      <p id="reviewProviderName" style="color:#6b7280; margin:0 0 24px; font-size:14px;"></p>

      <!-- Star Rating -->
      <div style="margin-bottom:20px;">
        <label style="display:block; font-weight:600; color:#374151; margin-bottom:10px;">Rating:</label>
        <div id="starRating" style="display:flex; gap:8px;">
          <span class="star-btn" data-val="1" style="font-size:32px; cursor:pointer; color:#DDD6FE;" onclick="selectStar(1)">★</span>
          <span class="star-btn" data-val="2" style="font-size:32px; cursor:pointer; color:#DDD6FE;" onclick="selectStar(2)">★</span>
          <span class="star-btn" data-val="3" style="font-size:32px; cursor:pointer; color:#DDD6FE;" onclick="selectStar(3)">★</span>
          <span class="star-btn" data-val="4" style="font-size:32px; cursor:pointer; color:#DDD6FE;" onclick="selectStar(4)">★</span>
          <span class="star-btn" data-val="5" style="font-size:32px; cursor:pointer; color:#DDD6FE;" onclick="selectStar(5)">★</span>
        </div>
        <input type="hidden" id="reviewRating" value="0">
      </div>

      <!-- Comment -->
      <div style="margin-bottom:20px;">
        <label style="display:block; font-weight:600; color:#374151; margin-bottom:8px;">Comment (optional):</label>
        <textarea id="reviewComment" rows="4" placeholder="Tell others about your experience..." style="width:100%; border:1.5px solid #DDD6FE; border-radius:8px; padding:12px; font-family:inherit; font-size:14px; resize:vertical; outline:none;"></textarea>
      </div>

      <div id="reviewError" style="color:#ef4444; font-size:13px; margin-bottom:12px; display:none;"></div>

      <div style="display:flex; gap:10px;">
        <button onclick="submitReview()" style="flex:1; background:linear-gradient(135deg,#7C3AED,#D946EF); color:white; border:none; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; font-size:15px;">Submit Review</button>
        <button onclick="closeReviewModal()" style="flex:1; background:#f3f4f6; color:#374151; border:none; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; font-size:15px;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Chat Modal for Customer Dashboard ── -->
  <style>
    #customerChatModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .customer-chat-container {
      background: white; border-radius: 12px;
      max-width: 600px; width: 90%; height: 500px;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .customer-chat-header {
      padding: 1.5rem; border-bottom: 1px solid #e5e7eb;
      display: flex; justify-content: space-between; align-items: center;
    }
    .customer-chat-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      background: #f9f9f9; display: flex; flex-direction: column;
    }
    .customer-chat-input {
      padding: 1rem; border-top: 1px solid #e5e7eb; display: flex; gap: 0.75rem;
    }
    .customer-chat-input input {
      flex: 1; border: 1px solid #d1d5db; border-radius: 6px;
      padding: 0.75rem; font-size: 0.95rem;
    }
    .customer-chat-input button {
      background: #6366f1; color: white; border: none; border-radius: 6px;
      padding: 0.75rem 1.5rem; cursor: pointer; font-weight: 600;
    }
    .customer-chat-input button:hover { background: #4f46e5; }
    .customer-chat-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; }
    .customer-chat-close:hover { color: #333; }
  </style>

  <div id="customerChatModal">
    <div class="customer-chat-container">
      <div class="customer-chat-header">
        <h2 style="font-size: 1.5rem; color: #333; margin: 0;">💬 Chat with <span id="providerNameDisplay">Provider</span></h2>
        <button class="customer-chat-close" onclick="closeChatModal()">✕</button>
      </div>
      <div class="customer-chat-messages" id="customerChatMessages">
        <div style="text-align: center; color: #999;">Loading messages...</div>
      </div>
      <div class="customer-chat-input">
        <input type="text" id="customerChatInput" placeholder="Type your message...">
        <button onclick="sendChatMessageCustomer()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // ── API URL HELPER ──
    function getApiUrl(endpoint) {
      if (window.CONFIG && window.CONFIG.getApiUrl) {
        return window.CONFIG.getApiUrl(endpoint);
      }
      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const base = isLocalhost ? 'http://localhost:5000' : 'https://cheapflixnepal-backend.onrender.com';
      return base + '/api' + endpoint;
    }

    const currentToken = localStorage.getItem('token');
    let currentUserId = null;

    // ── AUTH CHECK ──
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      let user = null;
      try { user = JSON.parse(localStorage.getItem('user')); } catch (e) { user = null; }

      if (!token || !user) { window.location.href = 'login.html'; return; }
      if (user.role === 'provider') { window.location.href = 'provider-dashboard.html'; return; }
      if (user.role === 'admin') { window.location.href = 'admin-dashboard.html'; return; }

      currentUserId = user.id;
      document.getElementById('userName').textContent = `Welcome, ${user.firstName}`;

      // Load profile from API (to get phone/address)
      loadProfileFromAPI(token);
      loadBookings(user.id, token);
      loadMyReviews(token);

      // Sidebar navigation
      document.querySelectorAll('.menu-link').forEach(link => {
        link.addEventListener('click', (e) => {
          const href = e.target.getAttribute('href');
          if (!href || !href.startsWith('#')) return; // let external links work
          e.preventDefault();
          document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
          document.querySelectorAll('.menu-link').forEach(m => m.classList.remove('active'));
          const target = document.querySelector(href);
          if (target) target.classList.add('active');
          e.target.classList.add('active');
        });
      });

      // Profile form submit
      document.getElementById('profileForm').addEventListener('submit', saveProfile);
    });

    // ── LOAD PROFILE FROM API ──
    async function loadProfileFromAPI(token) {
      try {
        const res = await fetch(getApiUrl('/users/profile'), {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load profile');
        const data = await res.json();
        const user = data.data || data;

        document.getElementById('profileName').value = `${user.firstName} ${user.lastName}`;
        document.getElementById('profileEmail').value = user.email;
        document.getElementById('profilePhone').value = user.phone || '';
        document.getElementById('profileAddress').value = user.address || '';
        document.getElementById('profileCity').value = user.city || '';
      } catch (err) {
        console.error('Error loading profile:', err);
        // Fallback to localStorage
        try {
          const user = JSON.parse(localStorage.getItem('user'));
          if (user) {
            document.getElementById('profileName').value = `${user.firstName} ${user.lastName}`;
            document.getElementById('profileEmail').value = user.email;
          }
        } catch (e) {}
      }
    }

    // ── SAVE PROFILE ──
    async function saveProfile(e) {
      e.preventDefault();
      const btn = document.getElementById('saveProfileBtn');
      const msgEl = document.getElementById('profileMsg');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const phone = document.getElementById('profilePhone').value.trim();
      const address = document.getElementById('profileAddress').value.trim();
      const city = document.getElementById('profileCity').value.trim();

      try {
        const res = await fetch(getApiUrl('/users/profile'), {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${currentToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ phone, address, city })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Show success
          msgEl.style.display = 'block';
          msgEl.style.background = '#f0fdf4';
          msgEl.style.color = '#15803d';
          msgEl.style.border = '1px solid #bbf7d0';
          msgEl.textContent = '✅ Profile updated successfully!';

          // Update localStorage user if phone/address changed
          try {
            const stored = JSON.parse(localStorage.getItem('user'));
            if (stored) {
              stored.phone = phone || stored.phone;
              localStorage.setItem('user', JSON.stringify(stored));
            }
          } catch (e) {}

          setTimeout(() => { msgEl.style.display = 'none'; }, 4000);
        } else {
          msgEl.style.display = 'block';
          msgEl.style.background = '#fef2f2';
          msgEl.style.color = '#dc2626';
          msgEl.style.border = '1px solid #fecaca';
          msgEl.textContent = '❌ ' + (data.error || 'Failed to update profile');
          setTimeout(() => { msgEl.style.display = 'none'; }, 5000);
        }
      } catch (err) {
        console.error('Save profile error:', err);
        msgEl.style.display = 'block';
        msgEl.style.background = '#fef2f2';
        msgEl.style.color = '#dc2626';
        msgEl.style.border = '1px solid #fecaca';
        msgEl.textContent = '❌ Network error. Please try again.';
        setTimeout(() => { msgEl.style.display = 'none'; }, 5000);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save Changes';
      }
    }

    // ── LOAD BOOKINGS ──
    async function loadBookings(userId, token) {
      try {
        const res = await fetch(getApiUrl(`/bookings/user/${userId}`), {
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        if (data.success) displayBookings(data.data);
        else displayBookings([]);
      } catch (err) {
        console.error('Error loading bookings:', err);
        document.getElementById('bookingsList').innerHTML =
          '<p style="color:red;">Failed to load bookings. Please refresh.</p>';
      }
    }

    // ── DISPLAY BOOKINGS ──
    function displayBookings(bookings) {
      const list = document.getElementById('bookingsList');
      if (!bookings || bookings.length === 0) {
        list.innerHTML = `
          <div style="text-align:center; padding:40px; color:#999;">
            <p>No bookings yet</p>
            <p style="font-size:12px; margin-top:10px;">Book a service to see it here</p>
          </div>`;
        return;
      }

      list.innerHTML = bookings.map(booking => {
        const isCompleted = booking.status === 'completed';
        const hasReview = booking.review != null;
        const providerFirstName = booking.provider?.user?.firstName || '';
        const providerLastName = booking.provider?.user?.lastName || '';
        const providerFullName = `${providerFirstName} ${providerLastName}`.trim();
        const providerId = booking.provider?.user?.id || '';

        const reviewBtn = isCompleted && !hasReview
          ? `<button onclick="openReviewModal('${booking.id}', '${providerFullName.replace(/'/g,"\\'")}', '${booking.providerId}')"
               style="background:linear-gradient(135deg,#7C3AED,#D946EF); color:white; border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600;">
               ⭐ Leave Review
             </button>`
          : isCompleted && hasReview
            ? `<span style="color:#10b981; font-size:12px; font-weight:600;">✅ Review Submitted</span>`
            : '';

        return `
        <div style="background:white; border:1px solid #eee; border-radius:8px; padding:16px; margin-bottom:12px;">
          <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
            <div>
              <h3 style="margin:0 0 4px; color:#333;">${booking.service?.name || 'Service'}</h3>
              <p style="margin:0; font-size:13px; color:#666;">
                Provider: <strong>${providerFullName}</strong>
              </p>
            </div>
            <span style="background:${getStatusColor(booking.status)}; color:white; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:600;">
              ${booking.status?.toUpperCase()}
            </span>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; font-size:13px;">
            <div><span style="color:#999;">📅 Date:</span> <strong>${new Date(booking.date).toLocaleDateString()}</strong></div>
            <div><span style="color:#999;">⏰ Time:</span> <strong>${booking.startTime}</strong></div>
            <div><span style="color:#999;">📍 Location:</span> <strong>${booking.location}</strong></div>
            <div><span style="color:#999;">💰 Amount:</span> <strong>Rs ${booking.totalAmount?.toLocaleString()}</strong></div>
          </div>

          <div style="padding-top:12px; border-top:1px solid #eee; display:flex; gap:8px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
            <small style="color:#999;">Ref: <strong>${booking.bookingRef}</strong></small>
            <div style="display:flex; gap:8px; align-items:center;">
              ${reviewBtn}
              <button onclick="openCustomerChat('${booking.id}', '${providerFullName.replace(/'/g,"\\'")}', '${providerId}')"
                style="background:#6366f1; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600;">
                💬 Chat
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function getStatusColor(status) {
      return { pending:'#FFA500', confirmed:'#4CAF50', in_progress:'#2196F3', completed:'#10b981', cancelled:'#f44336' }[status] || '#999';
    }

    // ── LOAD MY REVIEWS ──
    async function loadMyReviews(token) {
      const el = document.getElementById('myReviewsList');
      try {
        const res = await fetch(getApiUrl(`/bookings/user/${currentUserId}`), {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const bookings = (data.data || []).filter(b => b.review);
        if (!bookings.length) {
          el.innerHTML = '<p style="color:#999;">No reviews submitted yet. Complete a booking to leave a review!</p>';
          return;
        }
        el.innerHTML = bookings.map(b => {
          const stars = '★'.repeat(b.review.rating) + '☆'.repeat(5 - b.review.rating);
          return `
          <div style="background:white; border:1px solid #eee; border-radius:8px; padding:16px; margin-bottom:12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <strong style="color:#1f2937;">${b.service?.name || 'Service'}</strong>
              <span style="color:#f59e0b; font-size:18px;">${stars}</span>
            </div>
            <p style="color:#555; margin:0 0 4px; font-size:14px;">${b.review.comment || '(No comment)'}</p>
            <small style="color:#999;">${new Date(b.review.createdAt).toLocaleDateString()}</small>
          </div>`;
        }).join('');
      } catch (err) {
        el.innerHTML = '<p style="color:#999;">Could not load reviews.</p>';
      }
    }

    // ── REVIEW MODAL ──
    let reviewBookingId = null;
    let reviewProviderId = null;
    let selectedRating = 0;

    function openReviewModal(bookingId, providerName, providerId) {
      reviewBookingId = bookingId;
      reviewProviderId = providerId;
      selectedRating = 0;
      document.getElementById('reviewProviderName').textContent = `For: ${providerName}`;
      document.getElementById('reviewComment').value = '';
      document.getElementById('reviewError').style.display = 'none';
      document.getElementById('reviewRating').value = '0';
      // Reset stars
      document.querySelectorAll('.star-btn').forEach(s => s.style.color = '#DDD6FE');
      document.getElementById('reviewModal').style.display = 'flex';
    }

    function closeReviewModal() {
      document.getElementById('reviewModal').style.display = 'none';
      reviewBookingId = null;
      selectedRating = 0;
    }

    function selectStar(val) {
      selectedRating = val;
      document.getElementById('reviewRating').value = val;
      document.querySelectorAll('.star-btn').forEach(s => {
        s.style.color = parseInt(s.dataset.val) <= val ? '#f59e0b' : '#DDD6FE';
      });
    }

    async function submitReview() {
      const errEl = document.getElementById('reviewError');
      errEl.style.display = 'none';

      if (selectedRating < 1) {
        errEl.textContent = 'Please select a star rating.';
        errEl.style.display = 'block';
        return;
      }

      const comment = document.getElementById('reviewComment').value.trim();

      try {
        const res = await fetch(getApiUrl('/reviews'), {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${currentToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            bookingId: reviewBookingId,
            rating: parseInt(selectedRating),
            comment
          })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          closeReviewModal();
          // Show success and reload bookings
          alert('✅ Review submitted! Thank you for your feedback.');
          const user = JSON.parse(localStorage.getItem('user'));
          if (user) loadBookings(user.id, currentToken);
          loadMyReviews(currentToken);
        } else {
          errEl.textContent = '❌ ' + (data.error || 'Failed to submit review');
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = '❌ Network error. Please try again.';
        errEl.style.display = 'block';
      }
    }

    // Close review modal on backdrop click
    document.getElementById('reviewModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('reviewModal')) closeReviewModal();
    });

    // ── LOGOUT ──
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    // ── CHAT SYSTEM ──
    let currentChatBookingId = null;
    let currentChatReceiverId = null;
    let chatMessages = [];

    function openCustomerChat(bookingId, providerName, receiverId) {
      currentChatBookingId = bookingId;
      currentChatReceiverId = receiverId;
      document.getElementById('providerNameDisplay').textContent = providerName || 'Provider';
      loadChatMessages();
      document.getElementById('customerChatModal').style.display = 'flex';
      setTimeout(() => document.getElementById('customerChatInput').focus(), 100);
    }

    async function loadChatMessages() {
      try {
        const res = await fetch(getApiUrl(`/chat/booking/${currentChatBookingId}`), {
          headers: { 'Authorization': `Bearer ${currentToken}` }
        });
        if (res.ok) { const d = await res.json(); chatMessages = d.data || []; }
      } catch (err) { console.error('Load messages error:', err); }
      renderChatMessages();
    }

    function renderChatMessages() {
      const container = document.getElementById('customerChatMessages');
      if (!container) return;
      if (!chatMessages.length) {
        container.innerHTML = `<div style="text-align:center;color:#999;padding:2rem;">💬 No messages yet. Start the conversation!</div>`;
        return;
      }
      const me = JSON.parse(localStorage.getItem('user') || '{}');
      container.innerHTML = chatMessages.map(msg => {
        const time = new Date(msg.createdAt || new Date()).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        const mine = msg.senderId === me.id;
        return `
          <div style="display:flex; gap:.75rem; margin-bottom:1rem; ${mine ? 'justify-content:flex-end;' : ''}">
            <div style="max-width:70%;">
              <div style="background:${mine ? '#6366f1' : '#e5e7eb'}; color:${mine ? 'white' : '#333'}; padding:.75rem 1rem; border-radius:8px; word-wrap:break-word;">${msg.text || ''}</div>
              <div style="font-size:.75rem; color:#999; margin-top:.25rem; ${mine ? 'text-align:right;' : ''}">${time}</div>
            </div>
          </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendChatMessageCustomer() {
      const input = document.getElementById('customerChatInput');
      const message = input.value.trim();
      if (!message || !currentChatBookingId || !currentChatReceiverId) return;
      try {
        const res = await fetch(getApiUrl('/chat/send'), {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: currentChatBookingId, receiverId: currentChatReceiverId, text: message })
        });
        if (res.ok) {
          input.value = '';
          const d = await res.json();
          chatMessages.push(d.data || { text: message, createdAt: new Date(), senderId: currentUserId });
          renderChatMessages();
        } else {
          const err = await res.json();
          alert('❌ ' + (err.error || 'Failed to send message'));
        }
      } catch (err) { alert('❌ Failed to send message'); }
    }

    function closeChatModal() {
      document.getElementById('customerChatModal').style.display = 'none';
    }

    document.addEventListener('click', (e) => {
      const modal = document.getElementById('customerChatModal');
      if (modal && e.target === modal) closeChatModal();
    });

    document.addEventListener('keypress', (e) => {
      const input = document.getElementById('customerChatInput');
      if (input && e.key === 'Enter' && e.target === input) { e.preventDefault(); sendChatMessageCustomer(); }
    });
  </script>
</body>
</html>
